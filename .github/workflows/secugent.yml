name: secugent

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy --strict secugent/
      - name: Tests + coverage
        env:
          ANTHROPIC_API_KEY: ""
        # Enterprise-tier (tests/enterprise) and integration (tests/integration)
        # suites do NOT ship in the open-core public repo, so they are not
        # collected. We run the whole existing public tree (pyproject testpaths is
        # overridden when explicit paths are passed, so no explicit path arg is
        # given here — collection falls back to testpaths=["tests"]). The 80%
        # floor is the public tree's real, met coverage ceiling (the monorepo's
        # 85% relied on the now-absent enterprise/integration suites).
        run: >-
          pytest
          --cov=secugent --cov-fail-under=80

  # BDP_05 item 2/3/4: the public-release fail-closed gate
  # (scripts/check_public_release.py — import-closure + secret + strategy-doc
  # scan) is a standalone script, not a pytest target, so it needs its own job.
  # tests/release + tests/ops (manifest closure/secret/100x-determinism +
  # workflow structure) also run here as a focused, fast release-readiness check
  # on every push/PR, independent of the broader `test` job. (§B-9 local gate.)
  release-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Public-release gate (import-closure + secret + strategy-doc scan)
        run: python scripts/check_public_release.py
      - name: Release + ops test suites (manifest determinism, workflow structure)
        env:
          ANTHROPIC_API_KEY: ""
        run: pytest tests/release tests/ops -q
