# SPDX-License-Identifier: Apache-2.0
#
# BDP_05 item 2 — public/private release manifest (secugent-core v0.1.0).
#
# This file is the SINGLE SOURCE OF TRUTH for what ships in the public OSS repo.
# `scripts/check_public_release.py` reads it and enforces, fail-closed:
#   * deny-by-default  — anything NOT matched by `include` is private (Invariant I4).
#   * import-closure    — no public .py may import an Enterprise/private package (I2).
#   * forbidden-content — no internal-strategy doc / secret may reach the public set (I5).
#
# Glob semantics (a custom deterministic glob->regex translator, `_glob_to_regex`
# in check_public_release.py — NOT pathlib.Path.match, whose ** / Hangul handling
# is version-dependent) against the repo-relative POSIX path:
#   * "secugent/core/**"  matches every file at any depth under secugent/core/.
#   * "secugent/config.py" matches exactly that file.
#   * "**/.env"           matches a `.env` file at any depth (NOT `.env.example`).
# A path is PUBLIC iff it matches >=1 `include` glob AND 0 `exclude` globs
# (exclude always wins).
#
# DENY-BY-DEFAULT SCOPE (read carefully — I4 is true only at the TOP LEVEL):
#   A brand-new TOP-LEVEL package/file not named by any `include` glob is private
#   by default. BUT the broad recursive includes below (e.g. "secugent/core/**",
#   "docs/security/**", "tests/**", ".github/workflows/**") are ALLOW-BY-DEFAULT
#   within their subtree: a NEW file dropped under them ships automatically and is
#   only caught by the content/closure scanners. So a plain-prose internal doc
#   added under docs/security/ (no forbidden basename/Hangul/secret) could leak.
#   When adding a high-sensitivity file under a broad include, exclude it
#   explicitly. Do NOT assume "any new file is automatically safe".
#
# MIXED packages (orchestrator/agents/models) are included file-by-file so the
# Enterprise-coupled members (cost-quota importers) are never selected; they are
# ALSO listed under `exclude` as defence-in-depth (closure risks R1-R4).

include:
  # --- Fully-PUBLIC_CORE packages (spec §3.2) ---
  - "secugent/__init__.py"
  - "secugent/config.py"
  - "secugent/core/**"
  - "secugent/audit/**"
  # secugent/db/** = SQLite->PG migration lib + sync store-facade (DA-C1). Imports
  # only secugent.core.* (incl. the already-public event_store_pg) + audit.hash_chain
  # — a clean PUBLIC_CORE closure, classified PUBLIC_CORE in test_open_core_boundary.
  - "secugent/db/**"
  - "secugent/steer/**"
  - "secugent/observability/**"
  - "secugent/sdk/**"
  - "secugent/cli/**"
  - "secugent/regulations/**"
  - "secugent/tools/**"
  - "secugent/io/**"
  - "secugent/prompts/**"
  - "secugent/deploy/**"
  # --- MIXED packages — file-level include (spec §3.3) ---
  # orchestrator: every Core file EXCEPT sub_agent-coupled members. runner.py and
  # errors.py SHIP: they are import-closed (the optional secugent.cost quota tier
  # is referenced only under TYPE_CHECKING / lazily on the enforcement path), and
  # the shipping adapters (adapters.py / a2a_adapter.py / wiring.py / __init__.py)
  # depend on their cost-free symbols (PlanLike, the planner/dispatcher error
  # classes) at RUNTIME — excluding them broke standalone import (I8). The cost
  # *enforcement engine* (CostLedger) stays private in secugent/cost/**.
  - "secugent/orchestrator/__init__.py"
  - "secugent/orchestrator/adapters.py"
  - "secugent/orchestrator/mcp_adapter.py"
  - "secugent/orchestrator/a2a_adapter.py"
  - "secugent/orchestrator/adapters_langchain.py"
  - "secugent/orchestrator/envelope_gate.py"
  - "secugent/orchestrator/errors.py"
  # evidence_binding.py (N3 갭 ④): pure connector-payload → grounding.Evidence
  # re-validator. Imports ONLY secugent.core.grounding (PUBLIC_CORE) — import-closed,
  # ships as Core control-layer alongside core/grounding.py and tools/connectors/retrieval.py.
  - "secugent/orchestrator/evidence_binding.py"
  # grounding_context.py (2026-07-14 producer bridge): pure connector-payloads →
  # run-context grounding seed. Imports ONLY secugent.orchestrator.evidence_binding
  # (PUBLIC_CORE, above) — import-closed, the symmetric producer to the consumer in
  # runner.py; ships as Core control-layer alongside evidence_binding.py.
  - "secugent/orchestrator/grounding_context.py"
  - "secugent/orchestrator/events.py"
  - "secugent/orchestrator/lease.py"
  - "secugent/orchestrator/recovery.py"
  - "secugent/orchestrator/runner.py"
  - "secugent/orchestrator/state.py"
  - "secugent/orchestrator/wiring.py"
  # agents: dispatcher/head_agent only (sub_agent.py is cost-quota coupled).
  - "secugent/agents/__init__.py"
  - "secugent/agents/dispatcher.py"
  - "secugent/agents/head_agent.py"
  # models: catalog only (router.py is cost-ledger coupled).
  - "secugent/models/__init__.py"
  - "secugent/models/catalog.py"
  # --- Project root + docs + tests + tooling ---
  - "examples/**"
  - "tests/**"
  - "scripts/gen_sbom.py"
  - "scripts/check_public_release.py"
  - "scripts/extract_public_repo.sh"
  - "LICENSE"
  - "LICENSE.enterprise"
  - "NOTICE"
  - "SECURITY.md"
  - "README.md"
  - "CHANGELOG.md"
  - "pyproject.toml"
  - "requirements.txt"
  - ".gitattributes"
  - ".gitignore"
  - "docs/OPEN_CORE.md"
  - "docs/security/**"
  - ".github/workflows/**"
  # deploy/** artifacts (Dockerfile, docker-compose.yml, .env.example) are
  # intentionally PRIVATE: they boot secugent.api (Enterprise tier, excluded), so
  # a public image cannot run. The OSS repo ships as a library + CLI + SDK only;
  # deploy/** stays private by deny-by-default. (secugent/deploy/** — the Python
  # package — is a different path and stays public via the includes above.)
  - "config/models.yaml"
  - "release/public_manifest.yaml"
  # release/PUBLIC_RELEASE_RUNBOOK.md moved to exclude (maintainer-internal — see below)
  # Release notes shipped so runbook §6.3 `gh release create --notes-file
  # release/RELEASE_NOTES_v0.1.0.md` resolves inside the extracted public repo.
  - "release/RELEASE_NOTES_v0.1.0.md"
  # --- Governance / contribution infrastructure (BDP_05 item 5) ---
  # These files are required for an OSS public repo (contributor guide, code of
  # conduct, issue/PR templates). They contain NO internal strategy or secrets.
  # release.yml already ships via ".github/workflows/**" above; the four paths
  # below were missing from include (deny-by-default would have dropped them).
  - "CONTRIBUTING.md"
  - "CODE_OF_CONDUCT.md"
  - ".github/ISSUE_TEMPLATE/**"
  - ".github/PULL_REQUEST_TEMPLATE.md"

exclude:
  # --- Fully-ENTERPRISE packages — never public (spec §3.4) ---
  - "secugent/enterprise/**"
  - "secugent/compliance/**"
  - "secugent/cost/**"
  - "secugent/api/**"
  - "secugent/evolution/**"
  - "secugent/identity/**"
  - "secugent/integrations/**"
  - "secugent/desktop/**"
  - "ui/**"
  # --- MIXED-package Enterprise-coupled files (closure risks R3-R4) ---
  # sub_agent.py (token-budget enforcement) and models/router.py (cost-ledger
  # routing) carry real Enterprise cost-tier LOGIC and stay private on a LICENSE
  # basis, independent of import mechanism. W8/A4 made their secugent.cost import
  # lazy (TYPE_CHECKING + function-local), so they are now import-closed and would
  # PASS the closure check — do NOT promote them to the include set on that basis:
  # they must not ship because they embed the commercial quota/routing logic. Their
  # only PUBLIC consumers reference them annotation-only / by lazy re-export
  # (agents/dispatcher.py under TYPE_CHECKING; models/__init__.py via PEP 562
  # __getattr__), so the public set stays import-closed without them.
  # NOTE: runner.py / errors.py are NOT excluded — they were made import-closed
  # and now ship (see include above); the excluded-sibling closure check would
  # otherwise flag every public file that imports them at runtime.
  - "secugent/agents/sub_agent.py"
  - "secugent/models/router.py"
  # --- Internal-strategy / process docs (closure risks R7, R8) ---
  - "CLAUDE.md"
  - "SECURITY_CONTRACT.md"
  - "DEPLOY_PROGRESS.md"
  - "report_1.md"
  - "Review/**"
  - "BDP_REFORMED/**"
  - "docs/specs/**"
  # Maintainer-internal enterprise->public extraction runbook. Public users never run
  # the extraction; it also names specific internal strategy-doc filenames + private
  # repo structure. Kept PRIVATE — the public boundary story lives in docs/OPEN_CORE.md.
  - "release/PUBLIC_RELEASE_RUNBOOK.md"
  # Agent-team ops policies + bizdev sales artifacts (2026-07-19). Both are already
  # private via deny-by-default (not matched by any include glob); excluded
  # explicitly as defence-in-depth per the header rule for high-sensitivity paths.
  - "docs/agents/**"
  - "bizdev/**"
  # --- Korean-named strategy artifacts (closure risk R12) ---
  # fnmatch-style unicode globs; the scanner ALSO checks an explicit Hangul
  # substring list so a glob-engine quirk cannot let these leak.
  - "**/*시장진단*"
  - "**/*로우리스크*"
  - "**/*전략*"
  # --- Local state / scratch / secrets (closure risks R5, R11) ---
  - ".secugent/**"
  - "data/**"
  - ".claude/**"
  - "**/.env"
  - "**/*.key"
  - "**/*.pem"

  # --- Private-mirror TEST suites (deny-by-default for I2/I8) ---
  # `tests/**` is a broad include, but a test that imports a private tier cannot
  # ship: it would not even import in the standalone public repo (Invariant I8,
  # "pip install . && pytest -q"). These directories test ONLY private packages
  # (api/cost/enterprise/compliance/identity) and are excluded wholesale.
  - "tests/api/**"
  - "tests/cost/**"
  - "tests/enterprise/**"
  - "tests/compliance/**"
  - "tests/identity/**"
  - "tests/integrations/**"
  # playbooks tests import secugent.playbooks, which imports secugent.api
  # (Enterprise). Shipping them would break the standalone public `pytest -q`
  # (Invariant I8, ModuleNotFoundError) and leak Enterprise-tier coupling.
  - "tests/playbooks/**"
  # D1-deferred-tier test suites: these import secugent.evolution / secugent.desktop,
  # whose source is excluded from the public set. Shipping them would break the
  # standalone `pytest -q` (ModuleNotFoundError) and leak deferred-tier internals.
  # The expanded import-closure deny-set (FORBIDDEN_IMPORT_PREFIXES) now also
  # catches these automatically; they are enumerated here as defence-in-depth.
  - "tests/evolution/**"
  - "tests/unit/test_desktop_factory.py"
  - "tests/unit/test_desktop_security.py"
  - "tests/unit/test_stub_backend.py"
  # tests/desktop/** exercise the private secugent.desktop tier (Windows sandbox) via
  # external tools/mocks; they carry no public-code coverage and belong to the
  # excluded desktop tier (they also embed internal fix IDs in filenames).
  - "tests/desktop/**"
  # tests/cli/test_serve.py drove the removed `serve` subcommand and imports
  # secugent.api.* (HTTP server is Enterprise-tier) — I8 ModuleNotFoundError standalone.
  - "tests/cli/test_serve.py"
  # MIXED test dirs — exclude only the individual files that import a private
  # tier (the Core tests in the same dir still ship). Enumerated by the AST
  # closure scan over tests/ (BDP_05 item 2).
  - "tests/audit/test_kms_providers.py"
  - "tests/audit/test_merkle_root_kms_signed.py"
  # B5 KMS provider test imports secugent.enterprise.kms (private Enterprise tier,
  # excluded above) — would ModuleNotFoundError under the extracted public repo
  # (Invariant I8). Added W7 (import-closure round; G2 8→0).
  - "tests/audit/test_b5_kms_provider.py"
  # test_build_kms_provider.py drives the Enterprise VaultTransitProvider (imports
  # secugent.enterprise.kms lazily) — fails at runtime under the standalone public
  # repo (Invariant I8); it tests a private tier, not public code.
  - "tests/audit/test_build_kms_provider.py"
  - "tests/models/test_cascade_router.py"
  - "tests/orchestrator/test_runner_quota.py"
  - "tests/steer/test_steer_failed_hash_chain.py"
  - "tests/steer/test_steer_hash_chain.py"
  # SG-20260621 regression tests import secugent.api (private tier) — not public.
  - "tests/steer/test_sg_03_cross_tenant.py"
  - "tests/steer/test_sg_06_ws_audit.py"
  - "tests/steer/test_sg_08_checkpoint_path.py"
  - "tests/steer/test_sg_11_failed_fields.py"
  - "tests/steer/test_sg_23_24_schema_version.py"
  - "tests/steer/test_sg_17_dedup_interrupt.py"
  - "tests/steer/test_sg_18_intervene_tenant_guard.py"
  - "tests/unit/api/**"
  - "tests/integration/**"
  # Deploy tests exercise the full HA / air-gap bundle (helm/**, airgap/**,
  # postgres/**, constraints.txt, docker-compose.dev.yml) — none of which ship in
  # the public deploy set (only Dockerfile + docker-compose.yml + .env.example
  # do). They read those excluded files unconditionally, so under the extracted
  # repo they would FileNotFoundError. They test Enterprise-only deploy artifacts
  # and are excluded wholesale (BDP_05 item 2 fixer round 2).
  - "tests/deploy/**"
  # Tests that import the private SUB agent (secugent.agents.sub_agent — token-
  # budget enforcement, eager secugent.cost import, NOT shipped). They would
  # ModuleNotFoundError under the extracted repo's `pytest -q` (Invariant I8).
  # The excluded-sibling import-closure check now flags these automatically; they
  # are enumerated here as the primary deny (BDP_05 item 2 fixer round 2).
  - "tests/agents/test_dispatcher_envelope.py"
  - "tests/agents/test_dispatcher_parallel.py"
  # W5-c partial-approval end-to-end test drives the real Dispatcher+SubAgent
  # (secugent.agents.sub_agent, private SUB tier) to prove deferred steps never
  # dispatch — excluded (I8 ModuleNotFoundError under the extracted public repo).
  - "tests/agents/test_w5c_partial_dispatch.py"
  - "tests/agents/test_envelope_threading.py"
  - "tests/agents/test_sub_agent_envelope.py"
  # W5-f agent-eval harness tests import scripts.agent_evals.* (dispatcher_check /
  # golden / runner / merger_check) — a private, manifest-excluded eval tier. They
  # would ModuleNotFoundError under the extracted public `pytest -q` (Invariant I8)
  # and leak eval-harness internals. Added W7 (import-closure round; G2 8→0).
  - "tests/agents/test_eval_dispatcher_invariants.py"
  - "tests/agents/test_eval_harness.py"
  - "tests/agents/test_eval_merger_invariants.py"
  - "tests/core/test_rule_of_two_axis1.py"
  - "tests/core/test_rule_of_two_scenario.py"
  # test_llm_sovereign_w6 imports secugent.api.main (private API tier, excluded
  # above) to exercise _build_llm_settings sovereign-model boot wiring — would
  # ModuleNotFoundError under the extracted public repo (Invariant I8). Added W7.
  - "tests/core/test_llm_sovereign_w6.py"
  # G-H8 six-metric integration test: drives sub_agent (RISK_BRANCH/POLICY_BLOCK)
  # and models.router (LLM_TOKENS), both Enterprise-coupled (eager secugent.cost
  # import) and manifest-excluded. The public set keeps the closure-clean helper
  # unit tests (tests/observability/test_metrics_emit.py); only this end-to-end
  # scenario imports the private tiers and is excluded (Invariant I8).
  - "tests/observability/test_metrics_six_emit.py"
  # D3-RR-01 structlog decision-gate producer end-to-end tests: both drive the
  # private SUB agent (secugent.agents.sub_agent) to assert the parallel stream
  # is populated at the real decision points. The closure-clean helper unit
  # tests (tests/observability/test_decision_gate_producer.py) stay public; only
  # these two private-tier integration suites are excluded (Invariant I8).
  - "tests/observability/test_sub_agent_structlog_producer.py"
  - "tests/orchestrator/test_adapter_envelope.py"
  - "tests/orchestrator/test_adapters.py"
  # DA-H2 marker test drives secugent.agents.sub_agent (private SUB tier) to prove
  # the AI-identification marker on the live step.completed surface — excluded
  # (would ModuleNotFoundError under the extracted public `pytest -q`, Invariant I8).
  - "tests/orchestrator/test_da_h2_marker.py"
  - "tests/regulations/test_per_run_oversight_differential.py"
  - "tests/sdk/test_gate_hardening.py"
  - "tests/sdk/test_gate_structlog_producer.py"
  - "tests/unit/test_head_agent.py"
  - "tests/unit/test_sub_agent.py"
  # Test fixtures that embed real-shaped secret literals (sk-…, xoxb-…, signing
  # secrets). Even fake tokens must not ship in the public set (Invariant I5):
